name: SAST Pipeline

on:
  push:
    branches: ["main", "master", "develop", "feature/*", "add-*"]
  pull_request:
    branches: ["main", "master", "develop"]

jobs:
  # ─────────────────────────────────────────────
  # 1. Bandit — Python-specific security linter
  # ─────────────────────────────────────────────
  bandit:
    name: Bandit (Python Security)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bandit-${{ hashFiles('requirements.txt') }}

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: bandit -r . --configfile .bandit --format json --output bandit-report.json || true

      - name: Fail if MEDIUM or HIGH findings exist
        run: |
          python3 - <<'EOF'
          import json, sys
          with open("bandit-report.json") as f:
              data = json.load(f)
          issues = [i for i in data.get("results", []) if i["issue_severity"] in ("HIGH", "MEDIUM")]
          if issues:
              for i in issues:
                  print(f"[{i['issue_severity']}] {i['issue_text']} — {i['filename']}:{i['line_number']}")
              print(f"\n❌ {len(issues)} MEDIUM/HIGH finding(s). Fix before merging.")
              sys.exit(1)
          print("✅ No MEDIUM/HIGH findings.")
          EOF

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ─────────────────────────────────────────────
  # 2. Semgrep — multi-rule SAST engine
  # ─────────────────────────────────────────────
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep scan --config "p/python" --config "p/owasp-top-ten" --json --output semgrep-report.json || true

      - name: Fail if findings exist
        run: |
          python3 - <<'EOF'
          import json, sys
          with open("semgrep-report.json") as f:
              data = json.load(f)
          results = data.get("results", [])
          if results:
              for r in results:
                  print(f"[{r['extra']['severity']}] {r['extra']['message']} — {r['path']}:{r['start']['line']}")
              print(f"\n❌ {len(results)} Semgrep finding(s). Fix before merging.")
              sys.exit(1)
          print("✅ No Semgrep findings.")
          EOF

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json

  # ─────────────────────────────────────────────
  # 3. CodeQL — GitHub's deep semantic analysis
  # ─────────────────────────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql
          upload: always

  # ─────────────────────────────────────────────
  # 4. pip-audit — dependency vulnerability scan
  # ─────────────────────────────────────────────
  pip-audit:
    name: pip-audit (Dependency Vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --requirement requirements.txt --format json --output pip-audit-report.json || true

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  # ─────────────────────────────────────────────
  # 5. Gitleaks — secrets scanning
  # ─────────────────────────────────────────────
  gitleaks:
    name: Gitleaks (Secrets Scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so Gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # 6. Summary gate — blocks merge if SAST fails
  # ─────────────────────────────────────────────
  sast-gate:
    name: SAST Gate (must pass to merge)
    needs: [bandit, semgrep, codeql, pip-audit, gitleaks]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all SAST jobs
        run: |
          if [[ "${{ needs.bandit.result }}"    != "success" || \
                "${{ needs.semgrep.result }}"   != "success" || \
                "${{ needs.codeql.result }}"    != "success" || \
                "${{ needs.pip-audit.result }}" != "success" || \
                "${{ needs.gitleaks.result }}"  != "success" ]]; then
            echo "❌ One or more SAST checks failed. Review findings before merging."
            exit 1
          fi
          echo "✅ All SAST checks passed."
