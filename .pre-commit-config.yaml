# Run SAST checks locally before every commit.
# Install once: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["--configfile", ".bandit", "--severity-level", "medium"]

  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.3
    hooks:
      - id: pip-audit
        args: ["--strict"]
