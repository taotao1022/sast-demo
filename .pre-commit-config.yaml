# Run SAST checks locally before every commit.
# Install once: pip install pre-commit && pre-commit install

repos:
  # Bandit — Python security linter
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["--configfile", ".bandit", "--severity-level", "medium"]

  # Semgrep — multi-rule SAST
  - repo: https://github.com/semgrep/semgrep
    rev: v1.74.0
    hooks:
      - id: semgrep
        args: ["--config", "p/python", "--error"]

  # pip-audit — dependency CVE scan
  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.3
    hooks:
      - id: pip-audit
        args: ["--strict"]
